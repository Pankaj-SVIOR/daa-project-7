<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Teacher Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 48px 40px;
    width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
h1 { color: #fff; font-size: 24px; text-align: center; margin-bottom: 8px; }
.subtitle { color: rgba(255,255,255,0.4); text-align: center; font-size: 14px; margin-bottom: 32px; }
label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 8px; }
input, select {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
}
input:focus, select:focus { border-color: #6366f1; }
input::placeholder { color: rgba(255,255,255,0.3); }
select option { background: #1e1b4b; }
.btn {
    width: 100%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
    margin-bottom: 16px;
}
.btn:hover { opacity: 0.9; }
.back-link {
    display: block;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    text-decoration: none;
}
.back-link:hover { color: #6366f1; }
.msg-box {
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
}
.msg-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
.msg-error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
.step { display: none; }
.step.active { display: block; }
.icon { text-align: center; font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="card">
    <div class="icon">🔑</div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your name to reset your password</p>

    <div id="msg" class="msg-box"></div>

    <!-- Step 1: Find account -->
    <div id="step1" class="step active">
        <label>Your Name</label>
        <select id="teacherSelect">
            <option value="">-- Select your name --</option>
        </select>
        <label>New Password</label>
        <input type="password" id="newPass" placeholder="Enter new password">
        <label>Confirm Password</label>
        <input type="password" id="confirmPass" placeholder="Re-enter new password">
        <button class="btn" onclick="resetPassword()">Reset Password</button>
    </div>

    <!-- Step 2: Success -->
    <div id="step2" class="step">
        <div style="text-align:center">
            <div style="font-size:60px;margin-bottom:16px">✅</div>
            <p style="color:rgba(255,255,255,0.7);font-size:16px;margin-bottom:24px">Password updated successfully!</p>
            <a href="/login" class="btn" style="display:inline-block;text-decoration:none;padding:14px 32px;border-radius:10px;width:auto">Go to Login</a>
        </div>
    </div>

    <a href="/login" class="back-link">← Back to Login</a>
</div>

<script>
// Load all teachers for the dropdown
fetch('/teachers')
    .then(r => r.json())
    .then(list => {
        const sel = document.getElementById('teacherSelect');
        list.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.name;
            opt.textContent = t.name;
            sel.appendChild(opt);
        });
    });

function showMsg(msg, type) {
    const el = document.getElementById('msg');
    el.textContent = msg;
    el.className = 'msg-box ' + (type === 'error' ? 'msg-error' : 'msg-success');
    el.style.display = 'block';
}

function resetPassword() {
    const name    = document.getElementById('teacherSelect').value;
    const newPass = document.getElementById('newPass').value.trim();
    const confirm = document.getElementById('confirmPass').value.trim();

    if (!name)    return showMsg('Please select your name.', 'error');
    if (!newPass) return showMsg('Please enter a new password.', 'error');
    if (newPass !== confirm) return showMsg('Passwords do not match.', 'error');
    if (newPass.length < 4)  return showMsg('Password must be at least 4 characters.', 'error');

    fetch('/api/reset-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name: name, new_password: newPass })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        } else {
            showMsg(data.message || 'Reset failed.', 'error');
        }
    })
    .catch(() => showMsg('Server error.', 'error'));
}
</script>

</body>
</html>
