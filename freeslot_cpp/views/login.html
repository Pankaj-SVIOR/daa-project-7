<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Teacher Free Slot Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 48px 40px;
    width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.logo {
    text-align: center;
    margin-bottom: 32px;
}
.logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
}
h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
}
.subtitle {
    color: rgba(255,255,255,0.5);
    text-align: center;
    font-size: 14px;
    margin-top: 6px;
    margin-bottom: 32px;
}
label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
}
input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
}
input:focus { border-color: #6366f1; }
input::placeholder { color: rgba(255,255,255,0.3); }
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }
.forgot-link {
    display: block;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    margin-top: 20px;
    text-decoration: none;
    transition: color 0.2s;
}
.forgot-link:hover { color: #6366f1; }
.error-box {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fca5a5;
    font-size: 14px;
    margin-bottom: 20px;
    text-align: center;
    display: none;
}
.error-box.show { display: block; }
.divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 24px 0;
}
.demo-info {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
}
.demo-info p { color: rgba(255,255,255,0.5); font-size: 12px; line-height: 1.6; }
.demo-info strong { color: #a5b4fc; }
</style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <span class="logo-icon">🎓</span>
        <h1>Teacher Portal</h1>
        <p class="subtitle">Free Slot Finder System</p>
    </div>

    <div id="errorBox" class="error-box">
        Invalid name or password. Please try again.
    </div>

    <div>
        <label>Your Name</label>
        <input type="text" id="teacherName" placeholder="e.g. DR. PRATEEK SRIVASTAVA" autocomplete="off">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()">

        <button class="btn-login" onclick="doLogin()">Sign In</button>

        <a href="/forgot-password" class="forgot-link">Forgot your password?</a>
    </div>

    <hr class="divider">

    <div class="demo-info">
        <p>Default password for all teachers:<br>
        <strong>pass123</strong><br>
        Enter your full name exactly as in the system.</p>
    </div>
</div>

<script>
function doLogin() {
    const name = document.getElementById('teacherName').value.trim();
    const pass = document.getElementById('password').value.trim();
    if (!name || !pass) {
        showError('Please enter your name and password.');
        return;
    }
    fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name: name, password: pass })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'success') {
            window.location.href = '/dashboard';
        } else {
            showError(data.message || 'Login failed. Check your name and password.');
        }
    })
    .catch(() => showError('Server error. Please try again.'));
}
function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.add('show');
}
</script>

</body>
</html>
